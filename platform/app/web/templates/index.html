<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') ~ '?v=light-toggle-20260418' }}">
  </head>
  <body>
    <header class="site-header">
      <a class="site-logo" href="/">PlantLab</a>
      <nav class="site-nav" aria-label="Account">
        {% if current_user %}
        <span class="account-label">{{ current_user.name or current_user.email }}</span>
        <form action="/auth/logout" method="post">
          <button type="submit">Sign out</button>
        </form>
        {% else %}
        <a class="button" href="/login">Sign in</a>
        {% endif %}
      </nav>
    </header>

    <main>
      <p class="eyebrow">Platform Development</p>
      <h1>{{ app_name }}</h1>
      <p>FastAPI is running. Version {{ version }}.</p>
      {% if current_user %}
      <a class="button" href="/devices">View devices</a>
      {% endif %}
      <a href="/api/health">Health check</a>
    </main>
  </body>
</html>
