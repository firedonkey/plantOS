name: plantos

services:
  postgres:
    image: postgres:16
    container_name: plantlab-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: plantlab_user
      POSTGRES_PASSWORD: plantlab_dev_password
      POSTGRES_DB: plantlab
    ports:
      - "5432:5432"
    volumes:
      - plantlab_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantlab_user -d plantlab"]
      interval: 5s
      timeout: 5s
      retries: 20

  platform:
    build:
      context: ../../..
      dockerfile: platform/infra/docker/Dockerfile.platform
    container_name: plantlab-local-platform
    restart: unless-stopped
    env_file:
      - path: ../env/.env.local
        required: false
      - path: ../../../.env.local
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PLANTLAB_SKIP_DOTENV: "1"
      APP_ENV: development
      DATABASE_URL: postgresql://plantlab_user:plantlab_dev_password@postgres:5432/plantlab
      APP_SECRET_KEY: ${APP_SECRET_KEY:-local-dev-secret}
      PLANTLAB_DEV_TOKEN_AUTH_ENABLED: "true"
      PLANTLAB_STORAGE_BACKEND: local
      PLANTLAB_IMAGE_URL_STRATEGY: proxy
      PLANTLAB_UPLOAD_DIR: data/uploads
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      PLANTLAB_PROVISIONING_API_URL: http://provision-backend:3000
      PLANTLAB_PROVISIONING_SHARED_SECRET: ${PLANTLAB_PROVISIONING_SHARED_SECRET:-local-dev-provisioning-secret}
      PLANTLAB_LOCAL_SETUP_URL: ${PLANTLAB_LOCAL_SETUP_URL:-http://10.42.0.1:8080}
      PLANTLAB_STANDALONE_WEB_ORIGIN_REGEX: ${PLANTLAB_STANDALONE_WEB_ORIGIN_REGEX:-^https?://(localhost|127\.0\.0\.1|192\.168\.[0-9]+\.[0-9]+)(:[0-9]+)?$}
      PORT: 8080
    command: >
      sh -c "python -m app.db.local_migration_bootstrap &&
      uvicorn app.main:app --host 0.0.0.0 --port $${PORT:-8080}
      --proxy-headers --forwarded-allow-ips='*'"
    ports:
      - "8000:8080"
    volumes:
      - plantlab_platform_uploads:/app/platform/backend/data/uploads
      - plantlab_platform_firmware:/app/platform/backend/data/firmware
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  provision-backend:
    build:
      context: ../../../provision_backend
      dockerfile: Dockerfile
    container_name: plantlab-local-provision-backend
    restart: unless-stopped
    env_file:
      - path: ../env/.env.local
        required: false
      - path: ../../../.env.local
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://plantlab_user:plantlab_dev_password@postgres:5432/plantlab
      ENABLE_DEV_AUTH: "true"
      DEV_AUTH_USER_ID: "1"
      PLANTLAB_PROVISIONING_SHARED_SECRET: ${PLANTLAB_PROVISIONING_SHARED_SECRET:-local-dev-provisioning-secret}
      PORT: 3000
      PLANTLAB_LOCAL_SETUP_URL: ${PLANTLAB_LOCAL_SETUP_URL:-http://10.42.0.1:8080}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  plantlab_postgres_data:
  plantlab_platform_uploads:
  plantlab_platform_firmware:
