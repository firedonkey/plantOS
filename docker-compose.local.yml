services:
  postgres:
    image: postgres:16
    container_name: plantlab-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: plantlab_user
      POSTGRES_PASSWORD: plantlab_dev_password
      POSTGRES_DB: plantlab
    ports:
      - "5432:5432"
    volumes:
      - plantlab_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantlab_user -d plantlab"]
      interval: 5s
      timeout: 5s
      retries: 20

  platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plantlab-local-platform
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://plantlab_user:plantlab_dev_password@postgres:5432/plantlab
      APP_SECRET_KEY: ${APP_SECRET_KEY:-local-dev-secret}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      PLANTLAB_PROVISIONING_API_URL: http://provision-backend:3000
      PLANTLAB_PROVISIONING_SHARED_SECRET: ${PLANTLAB_PROVISIONING_SHARED_SECRET:-local-dev-provisioning-secret}
      PLANTLAB_LOCAL_SETUP_URL: ${PLANTLAB_LOCAL_SETUP_URL:-http://10.42.0.1:8080}
      PORT: 8080
    ports:
      - "8000:8080"
    volumes:
      - plantlab_platform_uploads:/app/platform/data/uploads

  provision-backend:
    build:
      context: ./provision_backend
      dockerfile: Dockerfile
    container_name: plantlab-local-provision-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://plantlab_user:plantlab_dev_password@postgres:5432/plantlab
      ENABLE_DEV_AUTH: "true"
      DEV_AUTH_USER_ID: "1"
      PLANTLAB_PROVISIONING_SHARED_SECRET: ${PLANTLAB_PROVISIONING_SHARED_SECRET:-local-dev-provisioning-secret}
      PORT: 3000
      PLANTLAB_LOCAL_SETUP_URL: ${PLANTLAB_LOCAL_SETUP_URL:-http://10.42.0.1:8080}
    ports:
      - "3000:3000"

volumes:
  plantlab_postgres_data:
  plantlab_platform_uploads:
