[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; ESP32-S3-DevKitC-1-N32R16V memory profile
board_upload.flash_size = 32MB
board_build.partitions = large_fat_32MB.csv
board_build.flash_mode = dout
board_build.psram_type = opi
board_build.arduino.memory_type = opi_opi

lib_deps =
  beegee-tokyo/DHT sensor library for ESPx@^1.19
  bblanchon/ArduinoJson@^7.0.4

build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_PSRAM

; Main firmware target (default app)
build_src_filter =
  +<*>
  -<tests/dht22_test_main.cpp>
  -<tests/moisture_test_main.cpp>
  -<tests/actuators_test_main.cpp>
  -<tests/camera_test_main.cpp>
  -<tests/camera_platform_test_main.cpp>
  -<tests/touch_test_main.cpp>
  -<tests/button_status_led_test_main.cpp>
  -<tests/wifi_test_main.cpp>
  -<tests/espnow_master_test_main.cpp>
  -<tests/espnow_camera_test_main.cpp>

