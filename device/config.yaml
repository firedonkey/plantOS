app:
  name: AI Plant Lab Kit
  timezone: America/Los_Angeles
  loop_interval_seconds: 10
  data_dir: data

hardware:
  mock_mode: true

sensors:
  dht22:
    enabled: true
    mock_mode: false
    gpio_pin: 4
    retries: 5
    retry_delay_seconds: 2
    mock_temperature_c: 22.5
    mock_temperature_variation_c: 1.5
    mock_humidity_percent: 52.0
    mock_humidity_variation_percent: 8.0
  moisture:
    enabled: true
    spi_bus: 0
    spi_device: 0
    adc_channel: 0
    dry_value: 850
    wet_value: 350
    mock_raw_value: 650
    mock_raw_variation: 80

actuators:
  relay_active_high: false
  pump:
    enabled: true
    gpio_pin: 17
    run_seconds: 5
    cooldown_seconds: 3600
  light:
    enabled: true
    gpio_pin: 27
    on_hour: 7
    off_hour: 21
    manual_override_seconds: 3600

camera:
  enabled: true
  mock_mode: false
  device_index: 0
  capture_interval_seconds: 10
  image_dir: data/images
  resolution: 1280x720
  skip_frames: 30

logging:
  format: csv
  log_dir: data/logs
  filename: plant_log.csv

automation:
  moisture_threshold_percent: 35

platform:
  url: http://127.0.0.1:8000
  device_id:
  device_token:
  send_interval_seconds: 10
