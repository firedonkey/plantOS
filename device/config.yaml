app:
  name: AI Plant Lab Kit
  timezone: America/Los_Angeles
  loop_interval_seconds: 10
  data_dir: data

hardware:
  mock_mode: false

sensors:
  dht22:
    enabled: true
    mock_mode: false
    gpio_pin: 4
    retries: 5
    retry_delay_seconds: 2
    mock_temperature_c: 22.5
    mock_temperature_variation_c: 1.5
    mock_humidity_percent: 52.0
    mock_humidity_variation_percent: 8.0
  moisture:
    enabled: true
    mock_mode: false
    adc_type: ads1115
    i2c_address: 0x48
    adc_channel: 0
    gain: 1
    data_rate: 128
    read_interval_seconds: 1
    moving_average_samples: 5
    # Calibrate these with your sensor:
    # dry_value is the raw ADS1115 reading in dry air or very dry soil.
    # wet_value is the raw ADS1115 reading in water or very wet soil.
    dry_value: 26000
    wet_value: 12000
    mock_raw_value: 19000
    mock_raw_variation: 1200

actuators:
  relay_active_high: false
  pump:
    enabled: true
    gpio_pin: 24
    run_seconds: 10
    cooldown_seconds: 3600
  light:
    enabled: true
    gpio_pin: 23
    on_hour: 7
    off_hour: 21
    manual_override_seconds: 3600

camera:
  enabled: true
  mock_mode: false
  device_index: 0
  capture_interval_seconds: 3600
  image_dir: data/images
  resolution: 1280x720
  skip_frames: 30

logging:
  format: csv
  log_dir: data/logs
  filename: plant_log.csv

automation:
  moisture_threshold_percent: 35

platform:
  url: http://127.0.0.1:8000
  device_id:
  device_token:
  send_interval_seconds: 10
  command_poll_interval_seconds: 2
  status_interval_seconds: 10

provisioning:
  backend_url: https://marspotatolab.com
  state_file: data/provisioning/device_config.json
  network_dry_run: true
  hardware_version: raspberry_pi_3
  software_version: 0.1.0
  capabilities:
    camera: true
    pump: true
    moisture_sensor: true
    light_control: true
